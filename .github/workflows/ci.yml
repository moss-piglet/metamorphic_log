name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  MIX_ENV: test
  METAMORPHIC_LOG_BUILD: "true"

jobs:
  test:
    name: Elixir ${{ matrix.elixir }} / OTP ${{ matrix.otp }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - { elixir: "1.15", otp: "26" }
          - { elixir: "1.16", otp: "26" }
          - { elixir: "1.17", otp: "27" }
          - { elixir: "1.18", otp: "28" }
          - { elixir: "1.19", otp: "28" }
          - { elixir: "1.20", otp: "29" }

    steps:
      # Actions pinned to commit SHA; @stable on rust-toolchain intentionally
      # tracks the current stable channel.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Erlang & Elixir
        uses: erlef/setup-beam@fc68ffb90438ef2936bbb3251622353b3dcb2f93 # v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache deps
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            deps
            _build
            native/metamorphic_log_nif/target
          key: ${{ runner.os }}-mix-${{ matrix.elixir }}-${{ matrix.otp }}-${{ hashFiles('mix.lock') }}-${{ hashFiles('native/**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-${{ matrix.elixir }}-${{ matrix.otp }}-

      - name: Install dependencies
        run: mix deps.get

      - name: Compile
        run: mix compile --warnings-as-errors

      - name: Run tests
        run: mix test

      - name: Check formatting
        run: mix format --check-formatted
        if: matrix.elixir == '1.20'

  rust_checks:
    name: Rust lint & test
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            native/metamorphic_log_nif/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('native/**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --check --manifest-path native/metamorphic_log_nif/Cargo.toml

      - name: Clippy
        run: cargo clippy --release --manifest-path native/metamorphic_log_nif/Cargo.toml -- -D warnings

  audit:
    name: cargo audit
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      # Scans the native crate's dependency tree for RustSec advisories. For a
      # transparency-log / cryptography NIF this is table stakes.
      - uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          working-directory: native/metamorphic_log_nif
